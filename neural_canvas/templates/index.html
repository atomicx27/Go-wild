<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-900 text-green-400 font-mono h-screen flex overflow-hidden cyber-bg">

    <!-- Sidebar / Chat Panel -->
    <div class="w-1/3 flex flex-col border-r border-green-500/50 p-4 glass-panel z-10 relative">
        <div class="mb-4 border-b border-green-500/50 pb-2">
            <h1 class="text-3xl font-bold neon-text uppercase tracking-widest"><i class="fas fa-brain mr-2"></i>Neural Canvas</h1>
            <p class="text-xs text-green-300/70 mt-1">Ollama Powered Node Network</p>
        </div>

        <div id="chat-history" class="flex-grow overflow-y-auto mb-4 space-y-3 pr-2 custom-scrollbar">
            <!-- Messages go here -->
            <div class="message system-msg text-sm p-2 rounded border border-green-700/50 bg-green-900/20 shadow-neon-sm">
                > System Online. State your prompt to modify the neural network.
            </div>
        </div>

        <form id="chat-form" class="mt-auto relative">
            <input type="text" id="prompt-input" autocomplete="off" class="w-full bg-gray-900 border border-green-500 text-green-400 p-3 pl-4 pr-12 rounded focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent cyber-input transition-all" placeholder="e.g., 'Add a red node connected to node 1'...">
            <button type="submit" class="absolute right-2 top-2 text-green-400 hover:text-green-300 transition-colors p-2 cursor-pointer neon-hover">
                <i class="fas fa-paper-plane"></i>
            </button>
            <div id="loading-indicator" class="hidden absolute right-12 top-3 text-green-400 animate-spin">
                <i class="fas fa-circle-notch"></i>
            </div>
        </form>
    </div>

    <!-- Main Canvas Area -->
    <div class="w-2/3 h-full relative">
        <div id="mynetwork" class="w-full h-full"></div>
        <div class="absolute top-4 right-4 pointer-events-none">
            <div class="text-xs text-green-500/50 border border-green-500/30 p-2 rounded bg-black/40 backdrop-blur-sm">
                Live Data Feed // Monitoring...
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
