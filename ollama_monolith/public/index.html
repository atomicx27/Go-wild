<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MONOLITH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Modern UI Enhancements Injected -->
<style>
html {
    scroll-behavior: smooth;
}
body {
    animation: fadeInBody 0.8s ease-out;
}
@keyframes fadeInBody {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
button, .btn, .button {
    transition: all 0.3s ease !important;
}
button:hover, .btn:hover, .button:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3) !important;
}
button:active, .btn:active, .button:active {
    transform: translateY(1px) !important;
}
input, textarea, select {
    transition: all 0.3s ease !important;
}
input:focus, textarea:focus, select:focus {
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.5) !important;
    border-color: #00ffff !important;
    outline: none !important;
}
.card, .agent-card, .task, .kanban-column {
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
}
.card:hover, .agent-card:hover, .task:hover {
    transform: translateY(-4px) scale(1.02) !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 255, 255, 0.2) !important;
    z-index: 10;
}
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb {
    background: rgba(0, 255, 255, 0.3);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 255, 255, 0.6);
}
</style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="overlay">
        <header>
            <h1>THE MONOLITH</h1>
            <p class="subtitle">ASK AND TREMBLE</p>
        </header>

        <div class="interaction-zone">
            <input type="text" id="query-input" placeholder="Whisper into the void..." autocomplete="off">
        </div>

        <div id="response-container" class="response-container">
            <div id="response-text" class="response-text"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
