<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synth Scribe Documentation</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            securityLevel: 'loose'
        });
    </script>

<!-- Modern UI Enhancements -->
<style>
    /* Global Transitions & Animations */
    button, .button, .btn {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        cursor: pointer !important;
        position: relative;
        overflow: hidden;
    }
    button:hover, .button:hover, .btn:hover {
        transform: scale(1.05) translateY(-2px) !important;
        box-shadow: 0 8px 20px rgba(153, 51, 255, 0.5), 0 0 10px rgba(0, 255, 153, 0.4) !important;
        filter: brightness(1.2) !important;
        z-index: 10;
    }
    button:active, .button:active, .btn:active {
        transform: scale(0.95) !important;
    }

    input, textarea, select {
        transition: all 0.3s ease-in-out !important;
    }
    input:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: 0 0 15px rgba(0, 255, 153, 0.6) !important;
        border-color: rgba(0, 255, 153, 0.8) !important;
        transform: scale(1.01) !important;
    }

    /* Container Glassmorphism & Hover */
    .card, .panel, .container, #ui, #header, .glass-panel {
        transition: all 0.4s ease-out !important;
    }
    .card:hover, .panel:hover, .glass-panel:hover {
        box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(153, 51, 255, 0.2) !important;
        transform: translateY(-4px) !important;
    }

    /* Page load animation */
    body {
        animation: globalFadeIn 1s ease-out !important;
    }
    @keyframes globalFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Scrollbar for modern feel */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
        background: rgba(153, 51, 255, 0.5);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: rgba(153, 51, 255, 0.8);
    }


    @keyframes floatElement {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
    }

</style>

</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <header class="glitch-header">
            <h1 data-text="SYSTEM_LORE">SYSTEM_LORE</h1>
        </header>

        <section class="summary-section">
            <h2>> EXECUTIVE_SUMMARY</h2>
            <div class="terminal-box">
                <p>{{ SUMMARY }}</p>
            </div>
        </section>

        <section class="architecture-section">
            <h2>> ARCHITECTURE_GRAPH</h2>
            <div class="mermaid-container">
                <div class="mermaid">
                    {{ MERMAID }}
                </div>
            </div>
        </section>

        <footer>
            <p>Generated by Synth Scribe Agent // Ollama Core</p>
        </footer>
    </div>
</body>
</html>
