<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      background: linear-gradient(45deg, #0a0a0a, #1a1a1a, #0f172a, #000000);
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      position: relative;
    }

    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    #game-container {
      text-align: center;
      z-index: 10;
      position: relative;
      animation: popIn 0.5s ease-out forwards;
    }
    canvas {
      background-color: #222;
      border: 2px solid #4CAF50;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      border-radius: 4px;
    }
    canvas:hover {
      box-shadow: 0 0 80px rgba(76, 175, 80, 1), 0 0 30px rgba(0, 255, 0, 0.6) inset;
      transform: scale(1.02);
    }
    h1 {
      margin-top: 0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }
    #score {
      font-size: 1.5em;
      margin-bottom: 15px;
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.3s ease;
      font-weight: bold;
    }
    .score-pulse {
      color: #4CAF50 !important;
      transform: scale(1.4);
      text-shadow: 0 0 30px #4CAF50, 0 0 60px #4CAF50;
    }
  </style>

<style>
/* Modern UI Enhancements */
html { scroll-behavior: smooth; cursor: none; }
* { cursor: none !important; }
body { transition: background-color 0.5s ease; }
button, .btn, a, .node, .task, .card {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}
button:hover, .btn:hover, a:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 7px 14px rgba(0,255,255,0.3), 0 3px 6px rgba(255,0,255,0.3) !important;
    filter: brightness(1.2);
}
button:active, .btn:active, a:active {
    transform: translateY(1px) scale(0.98);
}
input, textarea {
    transition: all 0.3s ease !important;
}
input:focus, textarea:focus {
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.5) !important;
    border-color: rgba(0, 243, 255, 0.8) !important;
    outline: none;
}
.fade-in-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}
.fade-in-up.visible {
    opacity: 1;
    transform: translateY(0);
}
/* Custom Cyber Cursor */
.cyber-cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #0ff;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
    mix-blend-mode: difference;
}
.cyber-cursor-trail {
    width: 8px;
    height: 8px;
    background-color: #f0f;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: top 0.1s ease-out, left 0.1s ease-out;
    box-shadow: 0 0 10px #f0f;
}
</style>

</head>
<body>

<div id="game-container">
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p>Use arrow keys to play.</p>
</div>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreElement = document.getElementById("score");

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake = [
    {x: 10, y: 10}
  ];
  let dx = 0;
  let dy = 0;
  let foodX = 15;
  let foodY = 15;
  let score = 0;
  let speed = 100;
  let gameLoop;

  function drawGame() {
    clearScreen();
    drawFood();
    moveSnake();
    drawSnake();
    checkGameOver();
  }

  function clearScreen() {
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawSnake() {
    ctx.shadowBlur = 15 + Math.sin(Date.now() / 150) * 15;
    ctx.shadowColor = "lime";
    ctx.fillStyle = "lime";
    for (let i = 0; i < snake.length; i++) {
      ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
    }
  }

  function moveSnake() {
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);

    if (head.x === foodX && head.y === foodY) {
      score += 10;
      scoreElement.innerText = "Score: " + score;
      scoreElement.classList.add('score-pulse');
      setTimeout(() => scoreElement.classList.remove('score-pulse'), 150);
      generateFood();
    } else {
      snake.pop();
    }
  }

  function drawFood() {
    ctx.shadowBlur = 20 + Math.sin(Date.now() / 100) * 15;
    ctx.shadowColor = "red";
    ctx.fillStyle = "red";
    ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
  }

  function generateFood() {
    foodX = Math.floor(Math.random() * tileCount);
    foodY = Math.floor(Math.random() * tileCount);

    // Check if food spawns on snake
    for(let part of snake) {
      if(part.x === foodX && part.y === foodY) {
        generateFood();
        break;
      }
    }
  }

  function checkGameOver() {
    let gameOver = false;

    // Wall collision
    if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
      gameOver = true;
    }

    // Self collision
    for (let i = 1; i < snake.length; i++) {
      if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
        gameOver = true;
      }
    }

    if (gameOver) {
      clearInterval(gameLoop);
      ctx.shadowBlur = 20;
      ctx.shadowColor = "red";
      ctx.fillStyle = "#ff4444";
      ctx.font = "bold 40px Courier New";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
      ctx.shadowBlur = 10;
      ctx.shadowColor = "white";
      ctx.fillStyle = "white";
      ctx.font = "18px Courier New";
      ctx.fillText("Press Space to restart", canvas.width / 2, canvas.height / 2 + 40);
    }
  }

  function resetGame() {
      snake = [{x: 10, y: 10}];
      dx = 0;
      dy = 0;
      score = 0;
      scoreElement.innerText = "Score: " + score;
      generateFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(drawGame, speed);
  }

  document.addEventListener("keydown", (event) => {
    // Prevent default scrolling for arrow keys
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].indexOf(event.code) > -1) {
        event.preventDefault();
    }

    if (event.key === "ArrowUp" && dy !== 1) {
      dx = 0;
      dy = -1;
    } else if (event.key === "ArrowDown" && dy !== -1) {
      dx = 0;
      dy = 1;
    } else if (event.key === "ArrowLeft" && dx !== 1) {
      dx = -1;
      dy = 0;
    } else if (event.key === "ArrowRight" && dx !== -1) {
      dx = 1;
      dy = 0;
    } else if (event.code === "Space") {
        resetGame();
    }
  });

  gameLoop = setInterval(drawGame, speed);

</script>

<script>
// Modern UI Enhancements Script
document.addEventListener('DOMContentLoaded', () => {
    // Custom Cursor
    const cursor = document.createElement('div');
    cursor.className = 'cyber-cursor';
    document.body.appendChild(cursor);

    const trail = document.createElement('div');
    trail.className = 'cyber-cursor-trail';
    document.body.appendChild(trail);

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';

        setTimeout(() => {
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
        }, 50);
    });

    document.addEventListener('mousedown', () => {
        cursor.style.width = '15px';
        cursor.style.height = '15px';
        cursor.style.backgroundColor = 'rgba(0, 255, 255, 0.5)';
    });

    document.addEventListener('mouseup', () => {
        cursor.style.width = '20px';
        cursor.style.height = '20px';
        cursor.style.backgroundColor = 'transparent';
    });

    // Add interactive hover effects to interactive elements
    const setupInteractives = () => {
        const interactives = document.querySelectorAll('button, a, input, .btn, .node, .task');
        interactives.forEach(el => {
            if (el.dataset.cursorEnhanced) return;
            el.dataset.cursorEnhanced = "true";
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '30px';
                cursor.style.height = '30px';
                cursor.style.borderColor = '#f0f';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.borderColor = '#0ff';
            });
        });
    };
    setupInteractives();

        // Intersection Observer for fade-in animations
    const observerFade = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    const applyFade = () => {
        const elementsToAnimate = document.querySelectorAll('h1, h2, .card, .container, .panel, .box, .column, .task, header, .agent-card');
        elementsToAnimate.forEach(el => {
            if (!el.classList.contains('fade-in-up')) {
                el.classList.add('fade-in-up');
                observerFade.observe(el);
            }
        });
    };
    applyFade();

    // In case of dynamic content (like Kanban boards), observe and re-bind
    const observerUI = new MutationObserver((mutations) => {
        setupInteractives();
        applyFade();
    });
    observerUI.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
