<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      background: linear-gradient(45deg, #0a0a0a, #1a1a1a, #0f172a, #000000);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      position: relative;
    }

    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    #game-container {
      text-align: center;
      z-index: 10;
      position: relative;
      animation: popIn 0.5s ease-out forwards;
    }
    canvas {
      background-color: #222;
      border: 2px solid #4CAF50;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      border-radius: 4px;
    }
    canvas:hover {
      box-shadow: 0 0 50px rgba(76, 175, 80, 0.8), 0 0 15px rgba(0, 255, 0, 0.4) inset;
      transform: scale(1.02);
    }
    h1 {
      margin-top: 0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }
    #score {
      font-size: 1.5em;
      margin-bottom: 15px;
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), text-shadow 0.3s ease;
      font-weight: bold;
    }
    .score-pulse {
      color: #4CAF50 !important;
      transform: scale(1.4);
      text-shadow: 0 0 30px #4CAF50, 0 0 60px #4CAF50;
    }
  </style>
</head>
<body>

<div id="game-container">
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p>Use arrow keys to play.</p>
</div>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreElement = document.getElementById("score");

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake = [
    {x: 10, y: 10}
  ];
  let dx = 0;
  let dy = 0;
  let foodX = 15;
  let foodY = 15;
  let score = 0;
  let speed = 100;
  let gameLoop;

  function drawGame() {
    clearScreen();
    drawFood();
    moveSnake();
    drawSnake();
    checkGameOver();
  }

  function clearScreen() {
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawSnake() {
    ctx.shadowBlur = 15 + Math.sin(Date.now() / 150) * 15;
    ctx.shadowColor = "lime";
    ctx.fillStyle = "lime";
    for (let i = 0; i < snake.length; i++) {
      ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
    }
  }

  function moveSnake() {
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);

    if (head.x === foodX && head.y === foodY) {
      score += 10;
      scoreElement.innerText = "Score: " + score;
      scoreElement.classList.add('score-pulse');
      setTimeout(() => scoreElement.classList.remove('score-pulse'), 150);
      generateFood();
    } else {
      snake.pop();
    }
  }

  function drawFood() {
    ctx.shadowBlur = 20 + Math.sin(Date.now() / 100) * 15;
    ctx.shadowColor = "red";
    ctx.fillStyle = "red";
    ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
  }

  function generateFood() {
    foodX = Math.floor(Math.random() * tileCount);
    foodY = Math.floor(Math.random() * tileCount);

    // Check if food spawns on snake
    for(let part of snake) {
      if(part.x === foodX && part.y === foodY) {
        generateFood();
        break;
      }
    }
  }

  function checkGameOver() {
    let gameOver = false;

    // Wall collision
    if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
      gameOver = true;
    }

    // Self collision
    for (let i = 1; i < snake.length; i++) {
      if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
        gameOver = true;
      }
    }

    if (gameOver) {
      clearInterval(gameLoop);
      ctx.shadowBlur = 20;
      ctx.shadowColor = "red";
      ctx.fillStyle = "#ff4444";
      ctx.font = "bold 40px Courier New";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
      ctx.shadowBlur = 10;
      ctx.shadowColor = "white";
      ctx.fillStyle = "white";
      ctx.font = "18px Courier New";
      ctx.fillText("Press Space to restart", canvas.width / 2, canvas.height / 2 + 40);
    }
  }

  function resetGame() {
      snake = [{x: 10, y: 10}];
      dx = 0;
      dy = 0;
      score = 0;
      scoreElement.innerText = "Score: " + score;
      generateFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(drawGame, speed);
  }

  document.addEventListener("keydown", (event) => {
    // Prevent default scrolling for arrow keys
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].indexOf(event.code) > -1) {
        event.preventDefault();
    }

    if (event.key === "ArrowUp" && dy !== 1) {
      dx = 0;
      dy = -1;
    } else if (event.key === "ArrowDown" && dy !== -1) {
      dx = 0;
      dy = 1;
    } else if (event.key === "ArrowLeft" && dx !== 1) {
      dx = -1;
      dy = 0;
    } else if (event.key === "ArrowRight" && dx !== -1) {
      dx = 1;
      dy = 0;
    } else if (event.code === "Space") {
        resetGame();
    }
  });

  gameLoop = setInterval(drawGame, speed);

</script>
</body>
</html>
