<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLLAMA OVERDRIVE // NEURAL DEBATE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- Modern UI Enhancements -->
<style>
    /* Global Transitions & Animations */
    button, .button, .btn {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        cursor: pointer !important;
        position: relative;
        overflow: hidden;
    }
    button:hover, .button:hover, .btn:hover {
        transform: scale(1.05) translateY(-2px) !important;
        box-shadow: 0 8px 20px rgba(0, 204, 255, 0.5), 0 0 10px rgba(138, 43, 226, 0.4) !important;
        filter: brightness(1.2) !important;
        z-index: 10;
    }
    button:active, .button:active, .btn:active {
        transform: scale(0.95) !important;
    }

    input, textarea, select {
        transition: all 0.3s ease-in-out !important;
    }
    input:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: 0 0 15px rgba(138, 43, 226, 0.6) !important;
        border-color: rgba(138, 43, 226, 0.8) !important;
        transform: scale(1.01) !important;
    }

    /* Container Glassmorphism & Hover */
    .card, .panel, .container, #ui, #header, .glass-panel {
        transition: all 0.4s ease-out !important;
    }
    .card:hover, .panel:hover, .glass-panel:hover {
        box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(0, 204, 255, 0.2) !important;
        transform: translateY(-4px) !important;
    }

    /* Page load animation */
    body {
        animation: globalFadeIn 1s ease-out !important;
    }
    @keyframes globalFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Scrollbar for modern feel */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
        background: rgba(0, 204, 255, 0.5);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 204, 255, 0.8);
    }


    @keyframes heartbeat {
        0% { transform: scale(1); }
        14% { transform: scale(1.05); }
        28% { transform: scale(1); }
        42% { transform: scale(1.05); }
        70% { transform: scale(1); }
    }

</style>

</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <header>
        <h1 class="glitch" data-text="OLLAMA OVERDRIVE">OLLAMA OVERDRIVE</h1>
        <p class="subtitle">MULTI-AGENT NEURAL DEBATE PROTOCOL ACTIVATED</p>
    </header>

    <main>
        <div class="control-panel">
            <label for="topic-input">> SUBJECT_OF_DEBATE:</label>
            <input type="text" id="topic-input" placeholder="e.g., The implications of conscious toasters" autocomplete="off">
            <button id="start-btn" class="cyber-button">INITIATE_CHAOS()</button>
        </div>

        <div class="debate-arena" id="arena">
            <!-- Persona panels will be injected here -->
        </div>

        <div class="synthesis-panel" id="synthesis-container" style="display: none;">
            <div class="panel-header glitch-text">>> SYNTHESIZING_TRUTH...</div>
            <div class="synthesis-output" id="synthesis-output"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
