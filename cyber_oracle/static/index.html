<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Oracle // Datastream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-green-400 font-mono crt overflow-x-hidden min-h-screen relative">

    <!-- Background grid overlay -->
    <div class="fixed inset-0 pointer-events-none grid-bg z-0 opacity-20"></div>

    <div class="container mx-auto px-4 py-12 relative z-10 max-w-4xl">

        <header class="mb-12 text-center">
            <h1 class="text-5xl font-bold mb-2 text-cyan-400 glow-text tracking-widest uppercase">Cyber Oracle</h1>
            <p class="text-gray-400 text-sm tracking-widest">// Multi-Agent Synthesizer System // V1.0 //</p>
        </header>

        <!-- Input Panel -->
        <div class="glass-panel p-6 mb-8 rounded-lg border border-cyan-800 shadow-lg shadow-cyan-900/50 transition-all duration-300">
            <h2 class="text-cyan-300 text-lg mb-4 border-b border-cyan-800 pb-2 flex items-center">
                <span class="inline-block w-2 h-2 bg-cyan-400 rounded-full mr-2 animate-pulse"></span>
                Enter Query Bounty
            </h2>
            <form id="bounty-form" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="query-input" required
                       class="flex-grow bg-black/50 border border-cyan-700 text-cyan-100 p-3 rounded focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors"
                       placeholder="e.g. Explain quantum computing concepts...">
                <button type="submit" id="submit-btn"
                        class="bg-cyan-900/80 hover:bg-cyan-700 text-cyan-100 border border-cyan-500 px-6 py-3 rounded uppercase tracking-wider font-bold transition-all shadow-[0_0_10px_rgba(34,211,238,0.3)] hover:shadow-[0_0_20px_rgba(34,211,238,0.6)]">
                    [ Execute ]
                </button>
            </form>
        </div>

        <!-- Terminal Status Window -->
        <div id="terminal" class="hidden glass-panel p-6 mb-8 rounded-lg border border-green-800 bg-black/80 font-mono text-sm shadow-lg">
            <div class="flex items-center justify-between border-b border-green-800 pb-2 mb-4">
                <span class="text-green-500">SYS_LOG :: RUNTIME</span>
                <span id="status-indicator" class="text-yellow-400 animate-pulse">[ PROCESSING ]</span>
            </div>
            <div id="log-output" class="space-y-2 max-h-64 overflow-y-auto">
                <!-- Logs will appear here -->
            </div>
        </div>

        <!-- Final Dossier Output -->
        <div id="dossier-container" class="hidden glass-panel p-8 rounded-lg border border-purple-800 bg-gray-900/90 shadow-lg shadow-purple-900/30">
            <div class="flex items-center border-b border-purple-800 pb-2 mb-6">
                <span class="inline-block w-3 h-3 bg-purple-500 mr-3"></span>
                <h2 class="text-purple-400 text-xl font-bold tracking-widest uppercase">Synthesized Dossier</h2>
            </div>
            <div id="dossier-content" class="prose prose-invert prose-p:text-gray-300 prose-headings:text-purple-300 prose-a:text-cyan-400 max-w-none">
                <!-- Markdown rendered output -->
            </div>
        </div>

    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
