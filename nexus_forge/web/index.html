<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Forge - AI Agent Factory</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- UI Enhancements -->
    <style>
        :root {
            --glow-color: #0ff;
            --glow-spread-color: rgba(0, 255, 255, 0.4);
        }
        button, .btn, .cyber-button {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            position: relative;
        }
        button:hover, .btn:hover, .cyber-button:hover {
            transform: translateY(-2px) scale(1.02) !important;
            box-shadow: 0 0 15px var(--glow-spread-color), 0 0 30px var(--glow-spread-color) !important;
            text-shadow: 0 0 8px var(--glow-color) !important;
            filter: brightness(1.2) !important;
        }
        button:active, .btn:active {
            transform: translateY(1px) scale(0.98) !important;
        }
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 15px var(--glow-spread-color) !important;
            border-color: var(--glow-color) !important;
            outline: none !important;
            animation: inputPulse 2s infinite alternate !important;
        }
        @keyframes inputPulse {
            0% { box-shadow: 0 0 10px var(--glow-spread-color); }
            100% { box-shadow: 0 0 20px var(--glow-spread-color), 0 0 5px var(--glow-color) inset; }
        }
        .panel, .card, .glass-panel, .kanban-column, .terminal-box {
            transition: all 0.4s ease-out !important;
        }
        .panel:hover, .card:hover, .glass-panel:hover, .terminal-box:hover {
            box-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.15), inset 0 0 10px rgba(0, 255, 255, 0.05) !important;
            transform: translateY(-2px);
        }
    </style>

</head>
<body>
    <div class="app-container">
        <header class="glitch-header">
            <h1 class="glitch" data-text="NEXUS FORGE">NEXUS FORGE</h1>
            <p class="subtitle">Autonomous AI Agent Software Factory</p>
        </header>

        <main class="kanban-board">
            <!-- TODO Column -->
            <div class="kanban-column" id="col-todo">
                <div class="column-header">
                    <h2><span class="neon-dot yellow"></span> BACKLOG</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="task-list" id="list-todo">
                    <!-- Tasks injected by JS -->
                </div>
            </div>

            <!-- IN PROGRESS Column -->
            <div class="kanban-column" id="col-in-progress">
                <div class="column-header">
                    <h2><span class="neon-dot blue pulse"></span> SYNTHESIZING</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="task-list" id="list-in-progress">
                    <!-- Tasks injected by JS -->
                </div>
            </div>

            <!-- DONE Column -->
            <div class="kanban-column" id="col-done">
                <div class="column-header">
                    <h2><span class="neon-dot green"></span> COMPILED</h2>
                    <span class="task-count">0</span>
                </div>
                <div class="task-list" id="list-done">
                    <!-- Tasks injected by JS -->
                </div>
            </div>
        </main>

        <footer>
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="pulse-ring"></span>
                    <span>SYSTEM ONLINE</span>
                </div>
                <div class="matrix-rain-toggle">
                    Toggle Matrix
                </div>
            </div>
        </footer>
    </div>

    <!-- Matrix Rain Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
