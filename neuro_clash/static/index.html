<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro Clash - AI Debate Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
/* Modern UI Enhancements */
html { scroll-behavior: smooth; cursor: none; }
* { cursor: none !important; }
body { transition: background-color 0.5s ease; }
button, .btn, a, .node, .task, .card {
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}
button:hover, .btn:hover, a:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 7px 14px rgba(0,255,255,0.3), 0 3px 6px rgba(255,0,255,0.3) !important;
    filter: brightness(1.2);
}
button:active, .btn:active, a:active {
    transform: translateY(1px) scale(0.98);
}
input, textarea {
    transition: all 0.3s ease !important;
}
input:focus, textarea:focus {
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.5) !important;
    border-color: rgba(0, 243, 255, 0.8) !important;
    outline: none;
}
.fade-in-up {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}
.fade-in-up.visible {
    opacity: 1;
    transform: translateY(0);
}
/* Custom Cyber Cursor */
.cyber-cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #0ff;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
    mix-blend-mode: difference;
}
.cyber-cursor-trail {
    width: 8px;
    height: 8px;
    background-color: #f0f;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: top 0.1s ease-out, left 0.1s ease-out;
    box-shadow: 0 0 10px #f0f;
}
</style>

</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-['Rajdhani'] bg-grid">
    <div class="container mx-auto px-4 py-8 max-w-5xl flex-grow flex flex-col">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-['Orbitron'] font-bold text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.8)] mb-2 tracking-widest uppercase">Neuro Clash</h1>
            <p class="text-gray-400 text-xl tracking-wide">Autonomous Cyber-Debate Arena</p>
        </header>

        <div class="mb-8 p-6 bg-gray-800/80 border border-cyan-500/30 rounded-lg shadow-[0_0_20px_rgba(0,0,0,0.5)] backdrop-blur-sm">
            <label for="topicInput" class="block text-sm font-medium text-cyan-400 mb-2 uppercase tracking-widest">Debate Topic</label>
            <div class="flex gap-4">
                <input type="text" id="topicInput" placeholder="e.g., Should AI govern humanity?"
                    class="flex-1 bg-gray-900 border border-gray-600 rounded-md px-4 py-2 text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors">
                <button id="startBtn" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-md transition-all uppercase tracking-wider hover:shadow-[0_0_15px_rgba(34,211,238,0.6)]">
                    Initiate Sequence
                </button>
                <button id="stopBtn" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-6 rounded-md transition-all uppercase tracking-wider hidden hover:shadow-[0_0_15px_rgba(220,38,38,0.6)]">
                    Terminate
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Alpha Agent -->
            <div id="card-Alpha" class="agent-card p-6 bg-gray-800/80 border-t-4 border-purple-500 rounded-lg text-center opacity-50 transition-all duration-500 flex flex-col items-center">
                <div class="w-20 h-20 rounded-full bg-gray-900 border-2 border-purple-500 flex items-center justify-center mb-4 avatar-glow">
                    <span class="text-3xl">🦹</span>
                </div>
                <h2 class="text-2xl font-bold text-purple-400 mb-1 font-['Orbitron']">Alpha</h2>
                <p class="text-xs text-purple-300 uppercase tracking-widest mb-4">Chaotic Hacker AI</p>
                <div class="status-indicator w-3 h-3 rounded-full bg-gray-600 mx-auto"></div>
            </div>

            <!-- Moderator Agent -->
            <div id="card-Moderator" class="agent-card p-6 bg-gray-800/80 border-t-4 border-cyan-500 rounded-lg text-center opacity-50 transition-all duration-500 flex flex-col items-center transform scale-105 z-10">
                <div class="w-24 h-24 rounded-full bg-gray-900 border-2 border-cyan-500 flex items-center justify-center mb-4 avatar-glow">
                    <span class="text-4xl">⚖️</span>
                </div>
                <h2 class="text-2xl font-bold text-cyan-400 mb-1 font-['Orbitron']">Moderator</h2>
                <p class="text-xs text-cyan-300 uppercase tracking-widest mb-4">Central Arbiter</p>
                <div class="status-indicator w-3 h-3 rounded-full bg-gray-600 mx-auto"></div>
            </div>

            <!-- Omega Agent -->
            <div id="card-Omega" class="agent-card p-6 bg-gray-800/80 border-t-4 border-emerald-500 rounded-lg text-center opacity-50 transition-all duration-500 flex flex-col items-center">
                <div class="w-20 h-20 rounded-full bg-gray-900 border-2 border-emerald-500 flex items-center justify-center mb-4 avatar-glow">
                    <span class="text-3xl">🤖</span>
                </div>
                <h2 class="text-2xl font-bold text-emerald-400 mb-1 font-['Orbitron']">Omega</h2>
                <p class="text-xs text-emerald-300 uppercase tracking-widest mb-4">Corporate Logic AI</p>
                <div class="status-indicator w-3 h-3 rounded-full bg-gray-600 mx-auto"></div>
            </div>
        </div>

        <div class="flex-grow flex flex-col bg-gray-800/50 border border-gray-700 rounded-lg overflow-hidden shadow-inner">
            <div class="bg-gray-900 border-b border-gray-700 p-3 flex justify-between items-center">
                <span class="text-sm font-['Orbitron'] text-gray-400 uppercase tracking-wider">Live Transcript</span>
                <span class="flex items-center gap-2">
                    <span id="recording-dot" class="w-2 h-2 rounded-full bg-red-500 hidden animate-pulse"></span>
                    <span id="status-text" class="text-xs text-gray-500 uppercase">Idle</span>
                </span>
            </div>
            <div id="transcript" class="p-6 flex-grow overflow-y-auto max-h-[400px] flex flex-col gap-4 font-sans text-lg">
                <!-- Dialogue will appear here -->
                <div class="text-center text-gray-500 italic mt-auto mb-auto">Awaiting debate initialization...</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

<script>
// Modern UI Enhancements Script
document.addEventListener('DOMContentLoaded', () => {
    // Custom Cursor
    const cursor = document.createElement('div');
    cursor.className = 'cyber-cursor';
    document.body.appendChild(cursor);

    const trail = document.createElement('div');
    trail.className = 'cyber-cursor-trail';
    document.body.appendChild(trail);

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';

        setTimeout(() => {
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
        }, 50);
    });

    document.addEventListener('mousedown', () => {
        cursor.style.width = '15px';
        cursor.style.height = '15px';
        cursor.style.backgroundColor = 'rgba(0, 255, 255, 0.5)';
    });

    document.addEventListener('mouseup', () => {
        cursor.style.width = '20px';
        cursor.style.height = '20px';
        cursor.style.backgroundColor = 'transparent';
    });

    // Add interactive hover effects to interactive elements
    const setupInteractives = () => {
        const interactives = document.querySelectorAll('button, a, input, .btn, .node, .task');
        interactives.forEach(el => {
            if (el.dataset.cursorEnhanced) return;
            el.dataset.cursorEnhanced = "true";
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '30px';
                cursor.style.height = '30px';
                cursor.style.borderColor = '#f0f';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                cursor.style.borderColor = '#0ff';
            });
        });
    };
    setupInteractives();

        // Intersection Observer for fade-in animations
    const observerFade = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    const applyFade = () => {
        const elementsToAnimate = document.querySelectorAll('h1, h2, .card, .container, .panel, .box, .column, .task, header, .agent-card');
        elementsToAnimate.forEach(el => {
            if (!el.classList.contains('fade-in-up')) {
                el.classList.add('fade-in-up');
                observerFade.observe(el);
            }
        });
    };
    applyFade();

    // In case of dynamic content (like Kanban boards), observe and re-bind
    const observerUI = new MutationObserver((mutations) => {
        setupInteractives();
        applyFade();
    });
    observerUI.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
