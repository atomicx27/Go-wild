<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Oracle // RAG Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <!-- UI Enhancements -->
    <style>
        :root {
            --glow-color: #0ff;
            --glow-spread-color: rgba(0, 255, 255, 0.4);
        }
        button, .btn, .cyber-button {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            position: relative;
        }
        button:hover, .btn:hover, .cyber-button:hover {
            transform: translateY(-2px) scale(1.02) !important;
            box-shadow: 0 0 15px var(--glow-spread-color), 0 0 30px var(--glow-spread-color) !important;
            text-shadow: 0 0 8px var(--glow-color) !important;
            filter: brightness(1.2) !important;
        }
        button:active, .btn:active {
            transform: translateY(1px) scale(0.98) !important;
        }
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 15px var(--glow-spread-color) !important;
            border-color: var(--glow-color) !important;
            outline: none !important;
            animation: inputPulse 2s infinite alternate !important;
        }
        @keyframes inputPulse {
            0% { box-shadow: 0 0 10px var(--glow-spread-color); }
            100% { box-shadow: 0 0 20px var(--glow-spread-color), 0 0 5px var(--glow-color) inset; }
        }
        .panel, .card, .glass-panel, .kanban-column, .terminal-box {
            transition: all 0.4s ease-out !important;
        }
        .panel:hover, .card:hover, .glass-panel:hover, .terminal-box:hover {
            box-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.15), inset 0 0 10px rgba(0, 255, 255, 0.05) !important;
            transform: translateY(-2px);
        }
    </style>

</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">⬡</span>
                <h1>Code Oracle</h1>
                <span class="badge">SYS: ONLINE</span>
            </div>
            <div class="controls">
                <label class="toggle">
                    <input type="checkbox" id="rag-toggle" checked>
                    <span class="slider"></span>
                    <span class="label-text">RAG</span>
                </label>
            </div>
        </header>

        <main>
            <div class="chat-container" id="chat-container">
                <div class="message system">
                    <div class="avatar">SYS</div>
                    <div class="content">
                        Code Oracle initialized. Connection to local index established. Awaiting query...
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <div class="input-wrapper">
                    <span class="prompt">❯</span>
                    <input type="text" id="query-input" placeholder="Ask about the codebase..." autocomplete="off" required>
                    <button type="submit" id="submit-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
