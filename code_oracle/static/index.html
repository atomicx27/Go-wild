<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Oracle // RAG Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Modern UI Enhancements Injected -->
<style>
html {
    scroll-behavior: smooth;
}
body {
    animation: fadeInBody 0.8s ease-out;
}
@keyframes fadeInBody {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
button, .btn, .button {
    transition: all 0.3s ease !important;
}
button:hover, .btn:hover, .button:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3) !important;
}
button:active, .btn:active, .button:active {
    transform: translateY(1px) !important;
}
input, textarea, select {
    transition: all 0.3s ease !important;
}
input:focus, textarea:focus, select:focus {
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.5) !important;
    border-color: #00ffff !important;
    outline: none !important;
}
.card, .agent-card, .task, .kanban-column {
    transition: transform 0.3s ease, box-shadow 0.3s ease !important;
}
.card:hover, .agent-card:hover, .task:hover {
    transform: translateY(-4px) scale(1.02) !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 15px rgba(0, 255, 255, 0.2) !important;
    z-index: 10;
}
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb {
    background: rgba(0, 255, 255, 0.3);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 255, 255, 0.6);
}
</style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">⬡</span>
                <h1>Code Oracle</h1>
                <span class="badge">SYS: ONLINE</span>
            </div>
            <div class="controls">
                <label class="toggle">
                    <input type="checkbox" id="rag-toggle" checked>
                    <span class="slider"></span>
                    <span class="label-text">RAG</span>
                </label>
            </div>
        </header>

        <main>
            <div class="chat-container" id="chat-container">
                <div class="message system">
                    <div class="avatar">SYS</div>
                    <div class="content">
                        Code Oracle initialized. Connection to local index established. Awaiting query...
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <div class="input-wrapper">
                    <span class="prompt">❯</span>
                    <input type="text" id="query-input" placeholder="Ask about the codebase..." autocomplete="off" required>
                    <button type="submit" id="submit-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
