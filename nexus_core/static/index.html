<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core // Autonomous Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <!-- UI Enhancements -->
    <style>
        :root {
            --glow-color: #0ff;
            --glow-spread-color: rgba(0, 255, 255, 0.4);
        }
        button, .btn, .cyber-button {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            position: relative;
        }
        button:hover, .btn:hover, .cyber-button:hover {
            transform: translateY(-2px) scale(1.02) !important;
            box-shadow: 0 0 15px var(--glow-spread-color), 0 0 30px var(--glow-spread-color) !important;
            text-shadow: 0 0 8px var(--glow-color) !important;
            filter: brightness(1.2) !important;
        }
        button:active, .btn:active {
            transform: translateY(1px) scale(0.98) !important;
        }
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 15px var(--glow-spread-color) !important;
            border-color: var(--glow-color) !important;
            outline: none !important;
            animation: inputPulse 2s infinite alternate !important;
        }
        @keyframes inputPulse {
            0% { box-shadow: 0 0 10px var(--glow-spread-color); }
            100% { box-shadow: 0 0 20px var(--glow-spread-color), 0 0 5px var(--glow-color) inset; }
        }
        .panel, .card, .glass-panel, .kanban-column, .terminal-box {
            transition: all 0.4s ease-out !important;
        }
        .panel:hover, .card:hover, .glass-panel:hover, .terminal-box:hover {
            box-shadow: 0 8px 32px 0 rgba(0, 255, 255, 0.15), inset 0 0 10px rgba(0, 255, 255, 0.05) !important;
            transform: translateY(-2px);
        }
    </style>

</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <header>
            <div class="logo">
                <h1>NEXUS_CORE</h1>
                <div class="status-indicator">
                    <span id="sys-status-dot" class="dot"></span>
                    <span id="sys-status-text">SYSTEM OFFLINE</span>
                </div>
            </div>
            <div class="engine-info">
                <span>ENGINE: OLLAMA / ReAct</span>
                <span id="ollama-status">Checking...</span>
            </div>
        </header>

        <main>
            <section class="control-panel panel glass">
                <h2>// COMMAND INTERFACE</h2>
                <div class="input-group">
                    <textarea id="task-input" placeholder="Enter objective for Nexus Core..." rows="3"></textarea>
                    <button id="btn-execute" class="cyber-btn">EXECUTE_TASK</button>
                </div>
            </section>

            <section class="terminal-panel panel glass">
                <div class="terminal-header">
                    <h2>// AGENT_LOGS</h2>
                    <div class="controls">
                        <button id="btn-clear" class="small-btn">CLEAR</button>
                    </div>
                </div>
                <div id="terminal-output" class="terminal-body">
                    <div class="log-entry system">Nexus Core initialized. Awaiting command...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
