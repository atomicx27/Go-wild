<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core // Autonomous Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<!-- Modern UI Enhancements -->
<style>
    /* Global Transitions & Animations */
    button, .button, .btn {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        cursor: pointer !important;
        position: relative;
        overflow: hidden;
    }
    button:hover, .button:hover, .btn:hover {
        transform: scale(1.05) translateY(-2px) !important;
        box-shadow: 0 8px 20px rgba(153, 51, 255, 0.5), 0 0 10px rgba(0, 255, 153, 0.4) !important;
        filter: brightness(1.2) !important;
        z-index: 10;
    }
    button:active, .button:active, .btn:active {
        transform: scale(0.95) !important;
    }

    input, textarea, select {
        transition: all 0.3s ease-in-out !important;
    }
    input:focus, textarea:focus, select:focus {
        outline: none !important;
        box-shadow: 0 0 15px rgba(0, 255, 153, 0.6) !important;
        border-color: rgba(0, 255, 153, 0.8) !important;
        transform: scale(1.01) !important;
    }

    /* Container Glassmorphism & Hover */
    .card, .panel, .container, #ui, #header, .glass-panel {
        transition: all 0.4s ease-out !important;
    }
    .card:hover, .panel:hover, .glass-panel:hover {
        box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(153, 51, 255, 0.2) !important;
        transform: translateY(-4px) !important;
    }

    /* Page load animation */
    body {
        animation: globalFadeIn 1s ease-out !important;
    }
    @keyframes globalFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Scrollbar for modern feel */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
        background: rgba(153, 51, 255, 0.5);
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: rgba(153, 51, 255, 0.8);
    }


    @keyframes pulseGlow {
        0% { filter: drop-shadow(0 0 5px rgba(153, 51, 255, 0.4)); }
        50% { filter: drop-shadow(0 0 15px rgba(153, 51, 255, 0.8)); }
        100% { filter: drop-shadow(0 0 5px rgba(153, 51, 255, 0.4)); }
    }

</style>

</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <header>
            <div class="logo">
                <h1>NEXUS_CORE</h1>
                <div class="status-indicator">
                    <span id="sys-status-dot" class="dot"></span>
                    <span id="sys-status-text">SYSTEM OFFLINE</span>
                </div>
            </div>
            <div class="engine-info">
                <span>ENGINE: OLLAMA / ReAct</span>
                <span id="ollama-status">Checking...</span>
            </div>
        </header>

        <main>
            <section class="control-panel panel glass">
                <h2>// COMMAND INTERFACE</h2>
                <div class="input-group">
                    <textarea id="task-input" placeholder="Enter objective for Nexus Core..." rows="3"></textarea>
                    <button id="btn-execute" class="cyber-btn">EXECUTE_TASK</button>
                </div>
            </section>

            <section class="terminal-panel panel glass">
                <div class="terminal-header">
                    <h2>// AGENT_LOGS</h2>
                    <div class="controls">
                        <button id="btn-clear" class="small-btn">CLEAR</button>
                    </div>
                </div>
                <div id="terminal-output" class="terminal-body">
                    <div class="log-entry system">Nexus Core initialized. Awaiting command...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
