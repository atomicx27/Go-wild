<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Commander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* slate-900 */
            color: #e2e8f0; /* slate-200 */
            font-family: 'Inter', sans-serif;
        }

        .glow {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); /* sky-400 */
        }

        .glow-text {
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.8);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7); /* slate-800 with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .terminal-output {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            white-space: pre-wrap;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
            50% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.6); }
            100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2); }
        }

        .active-pulse {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-6 border-b border-sky-900 glass-panel flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <i class="fas fa-terminal text-sky-400 text-2xl glow-text"></i>
            <h1 class="text-2xl font-bold tracking-wider text-sky-50 glow-text">NEXUS COMMANDER</h1>
        </div>
        <div id="connection-status" class="flex items-center gap-2 text-sm text-slate-400">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            Disconnected
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden flex flex-col p-6 max-w-6xl mx-auto w-full gap-6">

        <!-- Chat/History Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto glass-panel rounded-lg p-6 space-y-6 flex flex-col">
            <div class="text-center text-slate-500 my-auto" id="welcome-message">
                <i class="fas fa-robot text-6xl mb-4 text-sky-900"></i>
                <p class="text-lg">Nexus Commander is online. Awaiting your command.</p>
                <p class="text-sm mt-2">I can explore your system, run commands, and automate tasks.</p>
            </div>
            <!-- Messages will be appended here -->
        </div>

        <!-- Input Area -->
        <div class="glass-panel rounded-lg p-4 flex gap-4 items-center">
            <div class="flex-1 relative">
                <input type="text" id="task-input"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-200 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all placeholder-slate-600"
                    placeholder="Enter a task (e.g., 'Find all python files in the current directory')...">
                <div id="loading-indicator" class="hidden absolute right-4 top-1/2 transform -translate-y-1/2">
                    <i class="fas fa-circle-notch fa-spin text-sky-400"></i>
                </div>
            </div>
            <button id="send-btn" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-3 rounded-lg font-medium transition-all shadow-[0_0_10px_rgba(2,132,199,0.5)] hover:shadow-[0_0_15px_rgba(56,189,248,0.8)] flex items-center gap-2">
                <span>Execute</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
